<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<title>コーヒー記録</title>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  :root {
    --bg: #ffffff; --bg2: #f5f5f3; --bg3: #eeede8;
    --text: #1a1a1a; --text2: #666662; --text3: #aaa9a4;
    --border: rgba(0,0,0,0.12); --border2: rgba(0,0,0,0.22);
    --green-bg: #e1f5ee; --green-text: #085041;
    --blue-bg: #e6f1fb; --blue-text: #0c447c;
    --info-bg: #e6f1fb; --info-text: #0c447c;
    --ok-bg: #eaf3de; --ok-text: #27500a;
    --warn-bg: #faeeda; --warn-text: #633806;
    --danger-text: #a32d2d;
    --radius: 12px; --radius-sm: 8px;
  }
  @media (prefers-color-scheme: dark) {
    :root {
      --bg: #1c1c1a; --bg2: #252523; --bg3: #2e2e2b;
      --text: #f0efe8; --text2: #9a9992; --text3: #5f5e5a;
      --border: rgba(255,255,255,0.1); --border2: rgba(255,255,255,0.2);
      --green-bg: #04342c; --green-text: #9fe1cb;
      --blue-bg: #042c53; --blue-text: #b5d4f4;
      --info-bg: #042c53; --info-text: #b5d4f4;
      --ok-bg: #173404; --ok-text: #c0dd97;
      --warn-bg: #412402; --warn-text: #fac775;
      --danger-text: #f09595;
    }
  }
  body { font-family: -apple-system, BlinkMacSystemFont, 'Hiragino Sans', 'Noto Sans JP', sans-serif; background: var(--bg3); color: var(--text); min-height: 100vh; padding-bottom: 48px; }
  .app-header { background: var(--bg); border-bottom: 0.5px solid var(--border); padding: 14px 20px; position: sticky; top: 0; z-index: 10; }
  .app-header h1 { font-size: 17px; font-weight: 600; }
  .container { max-width: 560px; margin: 0 auto; padding: 16px 14px 0; }
  .tabs { display: flex; gap: 4px; margin-bottom: 16px; border-bottom: 0.5px solid var(--border); }
  .tab { padding: 8px 16px; font-size: 14px; font-weight: 500; color: var(--text2); background: none; border: none; cursor: pointer; border-bottom: 2px solid transparent; margin-bottom: -0.5px; }
  .tab.active { color: var(--text); border-bottom-color: var(--text); }
  .panel { display: none; }
  .panel.active { display: block; }
  .card { background: var(--bg); border: 0.5px solid var(--border); border-radius: var(--radius); padding: 16px; margin-bottom: 12px; }
  .card-title { font-size: 14px; font-weight: 500; color: var(--text2); margin-bottom: 12px; }
  .grid2 { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
  .grid3 { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 10px; }
  .field { display: flex; flex-direction: column; gap: 4px; }
  .field label { font-size: 12px; color: var(--text2); }
  .field input, .field textarea {
    height: 38px; border: 0.5px solid var(--border2); border-radius: var(--radius-sm);
    background: var(--bg2); color: var(--text); font-size: 14px; padding: 0 10px;
    outline: none; -webkit-appearance: none; font-family: inherit;
  }
  .field input:focus { border-color: #0f6e56; }
  .field textarea { height: auto; min-height: 70px; padding: 8px 10px; resize: vertical; }
  .field textarea:focus { border-color: #0f6e56; }
  .opt { font-size: 11px; color: var(--text3); margin-left: 4px; }
  .weather-row { display: flex; gap: 8px; align-items: center; margin-bottom: 8px; }
  .weather-info { font-size: 13px; color: var(--text2); flex: 1; }
  .btn { height: 38px; padding: 0 14px; border-radius: var(--radius-sm); border: 0.5px solid var(--border2); background: var(--bg2); color: var(--text); font-size: 14px; font-weight: 500; cursor: pointer; white-space: nowrap; -webkit-tap-highlight-color: transparent; }
  .btn:active { transform: scale(0.97); }
  .btn-primary { width: 100%; height: 42px; background: var(--bg2); border: 0.5px solid var(--border2); border-radius: var(--radius-sm); font-size: 14px; font-weight: 500; color: var(--text); cursor: pointer; margin-top: 4px; }
  .btn-primary:active { transform: scale(0.98); }
  .rating-row { display: flex; gap: 12px; justify-content: center; margin: 6px 0 4px; }
  .rating-face { font-size: 30px; cursor: pointer; opacity: 0.3; transition: opacity 0.12s, transform 0.12s; line-height: 1; }
  .rating-face.selected { opacity: 1; transform: scale(1.2); }
  .rating-face:hover { opacity: 0.75; }
  .rating-label { text-align: center; font-size: 12px; color: var(--text3); margin-top: 2px; }
  .success-msg { text-align: center; font-size: 13px; color: var(--ok-text); padding: 8px; display: none; }
  .cal-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 12px; }
  .cal-nav { background: none; border: 0.5px solid var(--border2); border-radius: var(--radius-sm); width: 32px; height: 32px; cursor: pointer; display: flex; align-items: center; justify-content: center; color: var(--text); font-size: 18px; }
  .cal-title { font-size: 15px; font-weight: 500; }
  .cal-grid { display: grid; grid-template-columns: repeat(7, 1fr); gap: 3px; }
  .cal-dow { text-align: center; font-size: 11px; color: var(--text3); padding: 4px 0; }
  .cal-day { aspect-ratio: 1; border-radius: var(--radius-sm); display: flex; flex-direction: column; align-items: center; justify-content: center; font-size: 12px; color: var(--text2); }
  .cal-day.has-log { background: var(--bg2); cursor: pointer; color: var(--text); }
  .cal-day.has-log:hover { border: 0.5px solid var(--border2); }
  .cal-day.today { font-weight: 600; color: var(--text); }
  .cal-day.selected { background: var(--info-bg) !important; color: var(--info-text) !important; }
  .cal-face { font-size: 11px; line-height: 1; margin-top: 1px; }
  .log-list { margin-top: 16px; }
  .log-entry { background: var(--bg); border: 0.5px solid var(--border); border-radius: var(--radius); padding: 14px 16px; margin-bottom: 10px; }
  .log-entry-header { display: flex; justify-content: space-between; align-items: flex-start; margin-bottom: 8px; }
  .log-entry-date { font-size: 13px; color: var(--text2); }
  .log-entry-bean { font-size: 15px; font-weight: 600; color: var(--text); margin-bottom: 6px; }
  .log-entry-stats { display: flex; gap: 6px; flex-wrap: wrap; margin-bottom: 6px; }
  .stat-chip { font-size: 12px; color: var(--text2); background: var(--bg2); border-radius: 99px; padding: 2px 8px; }
  .log-entry-weather { font-size: 12px; color: var(--text3); margin-bottom: 4px; }
  .log-entry-memo { font-size: 13px; color: var(--text2); border-left: 2px solid var(--border2); padding-left: 8px; margin-top: 6px; }
  .del-btn { background: none; border: none; cursor: pointer; color: var(--text3); font-size: 16px; padding: 2px 4px; }
  .del-btn:active { color: var(--danger-text); }
  .empty { text-align: center; color: var(--text3); font-size: 14px; padding: 2rem 0; }
</style>
</head>
<body>
<div class="app-header"><h1>☕ コーヒー記録</h1></div>
<div class="container">
  <div class="tabs">
    <button class="tab active" onclick="switchTab('record')">＋ 記録する</button>
    <button class="tab" onclick="switchTab('calendar')">📅 カレンダー</button>
  </div>

  <div id="panel-record" class="panel active">
    <div class="card">
      <p class="card-title">☕ 基本情報</p>
      <div class="grid2" style="margin-bottom:10px;">
        <div class="field"><label>日付</label><input type="date" id="r-date" /></div>
        <div class="field"><label>時刻<span class="opt">任意</span></label><input type="time" id="r-time" /></div>
      </div>
      <div class="field" style="margin-bottom:10px;"><label>使った豆の種類</label><input type="text" id="r-bean" placeholder="例: エチオピア イルガチェフェ" /></div>
      <div class="grid3">
        <div class="field"><label>豆の量 (g)</label><input type="number" id="r-beans-g" min="1" max="999" step="0.1" placeholder="例: 15" /></div>
        <div class="field"><label>お湯/水の量 (ml)</label><input type="number" id="r-water" min="1" max="9999" step="1" placeholder="例: 250" /></div>
        <div class="field"><label>温度 (℃)<span class="opt">任意</span></label><input type="number" id="r-temp" min="50" max="100" step="0.5" placeholder="例: 92" /></div>
      </div>
    </div>
    <div class="card">
      <p class="card-title">⏱ 抽出時間</p>
      <div class="grid2">
        <div class="field"><label>分</label><input type="number" id="r-min" min="0" max="59" placeholder="0" /></div>
        <div class="field"><label>秒</label><input type="number" id="r-sec" min="0" max="59" placeholder="30" /></div>
      </div>
    </div>
    <div class="card">
      <p class="card-title">🌤 天気<span class="opt">任意</span></p>
      <div class="weather-row">
        <button class="btn" onclick="fetchWeather()">📍 現在地から取得</button>
        <span class="weather-info" id="weather-info">ボタンを押して取得</span>
      </div>
      <div class="grid3">
        <div class="field"><label>天気</label><input type="text" id="r-weather" placeholder="例: 晴れ" /></div>
        <div class="field"><label>気温 (℃)</label><input type="number" id="r-wtemp" step="0.1" placeholder="例: 22.5" /></div>
        <div class="field"><label>湿度 (%)</label><input type="number" id="r-humid" min="0" max="100" placeholder="例: 60" /></div>
      </div>
    </div>
    <div class="card">
      <p class="card-title">⭐ 評価・メモ</p>
      <p style="font-size:13px;color:var(--text2);margin-bottom:6px;">味の評価</p>
      <div class="rating-row" id="rating-row">
        <span class="rating-face" data-v="1" onclick="setRating(1)" title="ひどい">😣</span>
        <span class="rating-face" data-v="2" onclick="setRating(2)" title="いまいち">😕</span>
        <span class="rating-face" data-v="3" onclick="setRating(3)" title="普通">😐</span>
        <span class="rating-face" data-v="4" onclick="setRating(4)" title="おいしい">😊</span>
        <span class="rating-face" data-v="5" onclick="setRating(5)" title="最高">🤩</span>
      </div>
      <p class="rating-label" id="rating-label">タップして評価</p>
      <div class="field" style="margin-top:12px;"><label>メモ<span class="opt">任意</span></label><textarea id="r-memo" placeholder="味・香り・改善点など自由に"></textarea></div>
    </div>
    <button class="btn-primary" onclick="saveRecord()">✓ 記録を保存</button>
    <p class="success-msg" id="success-msg">✓ 記録を保存しました！</p>
  </div>

  <div id="panel-calendar" class="panel">
    <div class="card">
      <div class="cal-header">
        <button class="cal-nav" onclick="calPrev()">‹</button>
        <span class="cal-title" id="cal-title"></span>
        <button class="cal-nav" onclick="calNext()">›</button>
      </div>
      <div class="cal-grid" id="cal-dow"></div>
      <div class="cal-grid" id="cal-grid"></div>
    </div>
    <div class="log-list" id="log-list"><p class="empty">日付を選択すると記録が表示されます</p></div>
  </div>
</div>

<script>
var logs=[], currentRating=0, calYear, calMonth, selectedDate=null;
var ratingLabels=['','ひどい','いまいち','普通','おいしい','最高！'];
var ratingFaces=['','😣','😕','😐','😊','🤩'];
var weatherCodes={0:'快晴',1:'晴れ',2:'一部曇り',3:'曇り',45:'霧',48:'霧氷',51:'小雨',53:'雨',55:'強雨',61:'小雨',63:'雨',65:'大雨',71:'小雪',73:'雪',75:'大雪',80:'にわか雨',81:'雨',82:'強雨',95:'雷雨',96:'雷雨',99:'雷雨'};

function today(){return new Date().toISOString().slice(0,10);}
function nowTime(){return new Date().toTimeString().slice(0,5);}
function fmt(d){var p=d.split('-');return p[0]+'/'+p[1]+'/'+p[2];}
function save(){try{localStorage.setItem('coffeeLog',JSON.stringify(logs));}catch(e){}}
function load(){try{var d=localStorage.getItem('coffeeLog');if(d)logs=JSON.parse(d);}catch(e){}}

document.getElementById('r-date').value=today();
document.getElementById('r-time').value=nowTime();

function switchTab(t){
  document.querySelectorAll('.tab').forEach(function(b){b.classList.remove('active');});
  document.querySelectorAll('.panel').forEach(function(p){p.classList.remove('active');});
  event.currentTarget.classList.add('active');
  document.getElementById('panel-'+t).classList.add('active');
  if(t==='calendar')renderCal();
}

function setRating(v){
  currentRating=v;
  document.querySelectorAll('.rating-face').forEach(function(f){f.classList.remove('selected');});
  document.querySelector('.rating-face[data-v="'+v+'"]').classList.add('selected');
  document.getElementById('rating-label').textContent=ratingLabels[v];
}

function fetchWeather(){
  var info=document.getElementById('weather-info');
  info.textContent='取得中...';
  if(!navigator.geolocation){info.textContent='位置情報非対応';return;}
  navigator.geolocation.getCurrentPosition(function(pos){
    var lat=pos.coords.latitude.toFixed(4),lon=pos.coords.longitude.toFixed(4);
    fetch('https://api.open-meteo.com/v1/forecast?latitude='+lat+'&longitude='+lon+'&current=temperature_2m,relative_humidity_2m,weathercode&timezone=Asia%2FTokyo')
    .then(function(r){return r.json();}).then(function(d){
      var c=d.current;
      var wname=weatherCodes[c.weathercode]||'不明';
      var temp=Math.round(c.temperature_2m*10)/10;
      var humid=Math.round(c.relative_humidity_2m);
      document.getElementById('r-weather').value=wname;
      document.getElementById('r-wtemp').value=temp;
      document.getElementById('r-humid').value=humid;
      info.textContent=wname+' / '+temp+'℃ / 湿度'+humid+'%';
    }).catch(function(){info.textContent='取得失敗。手動で入力してください。';});
  },function(){info.textContent='位置情報の許可が必要です。';});
}

function saveRecord(){
  var date=document.getElementById('r-date').value;
  var bean=document.getElementById('r-bean').value.trim();
  if(!date||!bean){alert('日付と豆の種類は必須です。');return;}
  var rec={
    id:Date.now(),date:date,time:document.getElementById('r-time').value,bean:bean,
    beansG:document.getElementById('r-beans-g').value,water:document.getElementById('r-water').value,
    temp:document.getElementById('r-temp').value,minT:document.getElementById('r-min').value,
    secT:document.getElementById('r-sec').value,weather:document.getElementById('r-weather').value,
    wtemp:document.getElementById('r-wtemp').value,humid:document.getElementById('r-humid').value,
    rating:currentRating,memo:document.getElementById('r-memo').value.trim()
  };
  logs.push(rec);
  logs.sort(function(a,b){return(b.date+b.time).localeCompare(a.date+a.time);});
  save();
  var msg=document.getElementById('success-msg');
  msg.style.display='block';
  setTimeout(function(){msg.style.display='none';},2500);
  ['r-bean','r-beans-g','r-water','r-temp','r-min','r-sec','r-weather','r-wtemp','r-humid','r-memo'].forEach(function(id){document.getElementById(id).value='';});
  document.getElementById('weather-info').textContent='ボタンを押して取得';
  currentRating=0;
  document.querySelectorAll('.rating-face').forEach(function(f){f.classList.remove('selected');});
  document.getElementById('rating-label').textContent='タップして評価';
}

var now=new Date();calYear=now.getFullYear();calMonth=now.getMonth();
function calPrev(){calMonth--;if(calMonth<0){calMonth=11;calYear--;}renderCal();}
function calNext(){calMonth++;if(calMonth>11){calMonth=0;calYear++;}renderCal();}

function renderCal(){
  var t=new Date();
  document.getElementById('cal-title').textContent=calYear+'年'+(calMonth+1)+'月';
  document.getElementById('cal-dow').innerHTML=['日','月','火','水','木','金','土'].map(function(d){return'<div class="cal-dow">'+d+'</div>';}).join('');
  var first=new Date(calYear,calMonth,1).getDay();
  var last=new Date(calYear,calMonth+1,0).getDate();
  var html='';
  for(var i=0;i<first;i++)html+='<div></div>';
  for(var d=1;d<=last;d++){
    var ds=calYear+'-'+(calMonth+1<10?'0':'')+(calMonth+1)+'-'+(d<10?'0':'')+d;
    var dl=logs.filter(function(l){return l.date===ds;});
    var isToday=(ds===t.toISOString().slice(0,10));
    var isSel=(ds===selectedDate);
    var cls='cal-day'+(dl.length?' has-log':'')+(isToday?' today':'')+(isSel?' selected':'');
    var face='';
    if(dl.length){var best=dl.reduce(function(a,b){return b.rating>a.rating?b:a;},dl[0]);face=best.rating?'<div class="cal-face">'+ratingFaces[best.rating]+'</div>':'<div class="cal-face" style="font-size:8px;color:var(--text3)">●</div>';}
    var oc=dl.length?'onclick="selectDay(\''+ds+'\')"':'';
    html+='<div class="'+cls+'" '+oc+'><span>'+d+'</span>'+face+'</div>';
  }
  document.getElementById('cal-grid').innerHTML=html;
  if(selectedDate)renderLogList(selectedDate);
}

function selectDay(ds){selectedDate=ds;renderCal();renderLogList(ds);}

function renderLogList(ds){
  var dl=logs.filter(function(l){return l.date===ds;});
  var el=document.getElementById('log-list');
  if(!dl.length){el.innerHTML='<p class="empty">この日の記録はありません</p>';return;}
  el.innerHTML='<p style="font-size:13px;color:var(--text2);margin-bottom:8px;">'+fmt(ds)+' の記録 ('+dl.length+'件)</p>'+
  dl.map(function(l){
    var timeStr=l.time?' '+l.time:'';
    var extraction=(l.minT||l.secT)?(l.minT||'0')+'分'+(l.secT||'0')+'秒':'';
    var chips=[];
    if(l.beansG)chips.push('豆 '+l.beansG+'g');
    if(l.water)chips.push('お湯/水 '+l.water+'ml');
    if(l.temp)chips.push('温度 '+l.temp+'℃');
    if(extraction)chips.push('抽出 '+extraction);
    var wp=[];if(l.weather)wp.push(l.weather);if(l.wtemp)wp.push(l.wtemp+'℃');if(l.humid)wp.push('湿度'+l.humid+'%');
    var weatherStr=wp.length?'<div class="log-entry-weather">🌤 '+wp.join(' / ')+'</div>':'';
    return '<div class="log-entry"><div class="log-entry-header"><div><div class="log-entry-date">'+fmt(l.date)+timeStr+'</div><div class="log-entry-bean">'+l.bean+'</div></div><div style="display:flex;align-items:center;gap:8px;"><span style="font-size:22px;">'+(l.rating?ratingFaces[l.rating]:'—')+'</span><button class="del-btn" onclick="delLog('+l.id+')">🗑</button></div></div>'+(chips.length?'<div class="log-entry-stats">'+chips.map(function(c){return'<span class="stat-chip">'+c+'</span>';}).join('')+'</div>':'')+weatherStr+(l.memo?'<div class="log-entry-memo">'+l.memo+'</div>':'')+'</div>';
  }).join('');
}

function delLog(id){logs=logs.filter(function(l){return l.id!==id;});save();renderCal();if(selectedDate)renderLogList(selectedDate);}

load();
</script>
</body>
</html>
